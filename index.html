<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monthly Budget Tracker</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

  <header class="app-header">
    <h1>Monthly Budget Tracker</h1>
    <div class="month-controls">
      <label for="income">Monthly income</label>
      <input type="number" id="income" placeholder="$0.00" step="0.01">
      <button id="resetMonthBtn" class="btn btn-outline" title="Clear all paid checkmarks and expense log for a new month">Reset Month</button>
    </div>
  </header>

  <section class="summary" id="summary">
    <div class="summary-card">
      <span class="summary-label">Fixed bills</span>
      <span class="summary-value" id="totalFixed">$0.00</span>
    </div>
    <div class="summary-card">
      <span class="summary-label">As-needed spent</span>
      <span class="summary-value" id="totalAsNeeded">$0.00</span>
    </div>
    <div class="summary-card">
      <span class="summary-label">Total planned/spent</span>
      <span class="summary-value" id="totalAll">$0.00</span>
    </div>
    <div class="summary-card highlight">
      <span class="summary-label">Remaining</span>
      <span class="summary-value" id="totalRemaining">$0.00</span>
    </div>
  </section>

  <main class="weeks" id="weeksContainer">
    <!-- weeks injected by JS -->
  </main>

  <section class="as-needed" id="asNeededContainer">
    <!-- as-needed categories injected by JS -->
  </section>

</div>

<script src="app.js"></script>
</body>
</html>
